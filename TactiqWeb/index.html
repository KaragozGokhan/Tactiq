<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tactiq Test UI</title>
  <style>
    :root { color-scheme: light; --ink:#18212f; --muted:#667085; --line:#d7dde7; --bg:#f6f7f9; --panel:#fff; --accent:#0f766e; --bad:#b42318; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.45 system-ui, -apple-system, Segoe UI, sans-serif; color: var(--ink); background: var(--bg); }
    header { position: sticky; top: 0; z-index: 2; padding: 12px 16px; background: #111827; color: white; }
    h1 { margin: 0; font-size: 18px; letter-spacing: 0; }
    main { display: grid; gap: 12px; max-width: 1180px; margin: 0 auto; padding: 12px; }
    section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    h2 { margin: 0 0 10px; font-size: 15px; }
    label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; }
    input, select, textarea, button { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 10px; font: inherit; }
    textarea { min-height: 180px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; }
    button { cursor: pointer; background: var(--accent); border-color: var(--accent); color: white; font-weight: 650; }
    button.secondary { background: #eef2f6; color: var(--ink); border-color: var(--line); }
    button.danger { background: var(--bad); border-color: var(--bad); }
    .grid { display: grid; gap: 10px; }
    .cols { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .players { display: grid; gap: 8px; }
    .player { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; border-bottom: 1px solid var(--line); padding: 8px 0; }
    .player input { width: auto; }
    .name { font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; }
    .pill { justify-self: end; border: 1px solid var(--line); border-radius: 999px; padding: 3px 8px; font-size: 12px; background: #f8fafc; }
    pre { overflow: auto; margin: 0; padding: 10px; min-height: 80px; border: 1px solid var(--line); border-radius: 6px; background: #0b1220; color: #dbeafe; font-size: 12px; }
    @media (min-width: 860px) { main { grid-template-columns: 360px 1fr; } .wide { grid-column: 1 / -1; } }
  </style>
</head>
<body>
  <header><h1>Tactiq Test UI</h1></header>
  <main>
    <section class="grid">
      <h2>Baglanti</h2>
      <label>API Base <input id="apiBase" value="http://localhost:5000/api"></label>
      <div class="cols">
        <label>Username <input id="username" value="demo"></label>
        <label>Email <input id="email" value="demo@tactiq.test"></label>
      </div>
      <label>Password <input id="password" type="password" value="Pass123!"></label>
      <div class="actions">
        <button id="registerBtn" class="secondary">Register</button>
        <button id="loginBtn">Login</button>
      </div>
    </section>

    <section class="grid">
      <h2>Oyuncular</h2>
      <div class="actions">
        <button id="loadPlayersBtn" class="secondary">Listele</button>
        <button id="deletePlayersBtn" class="danger">Secili Sil</button>
      </div>
      <div id="players" class="players"></div>
    </section>

    <section class="grid">
      <h2>Toplu Oyuncu</h2>
      <textarea id="playersJson" spellcheck="false"></textarea>
      <div class="actions">
        <button id="dbPlayersBtn" class="secondary">DB'den Al</button>
        <button id="createPlayersBtn">Oyunculari Ekle</button>
      </div>
    </section>

    <section class="grid">
      <h2>Takim Kurucu</h2>
      <div class="cols">
        <label>Mac tipi
          <select id="teamSize">
            <option>6</option><option selected>7</option><option>8</option><option>9</option><option>10</option><option>11</option>
          </select>
        </label>
        <label>Dizilis <input id="formation" value="2-3-1"></label>
      </div>
      <button id="balanceBtn">Secili Oyuncularla Dengele</button>
      <pre id="teamsOutput"></pre>
    </section>

    <section class="grid">
      <h2>Hizli Mac</h2>
      <div class="cols">
        <label>Tarih <input id="matchDate" type="datetime-local"></label>
        <label>Sure <input id="duration" type="number" value="60"></label>
        <label>Ev Skor <input id="homeScore" type="number" value="5"></label>
        <label>Dep Skor <input id="awayScore" type="number" value="7"></label>
        <label>Rating <input id="defaultRating" type="number" step="0.1" value="7.5"></label>
      </div>
      <button id="bulkMatchBtn">Secili Oyunculari A/B Bol ve Mac Kaydet</button>
    </section>

    <section class="grid wide">
      <h2>Detayli Mac JSON</h2>
      <textarea id="matchJson" spellcheck="false"></textarea>
      <button id="createMatchBtn">POST /matches</button>
    </section>

    <section class="grid wide">
      <h2>Sonuc</h2>
      <pre id="output"></pre>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    $("matchDate").value = new Date().toISOString().slice(0, 16);
    $("playersJson").value = "";
    $("apiBase").value = localStorage.tactiqApiBase || $("apiBase").value;

    function token() { return localStorage.tactiqToken || ""; }
    function selectedIds() { return [...document.querySelectorAll("[data-player-id]:checked")].map(x => Number(x.value)); }
    function write(data, target = "output") { $(target).textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2); }

    async function api(path, options = {}) {
      localStorage.tactiqApiBase = $("apiBase").value.replace(/\/$/, "");
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (token()) headers.Authorization = `Bearer ${token()}`;
      const res = await fetch(`${localStorage.tactiqApiBase}${path}`, { ...options, headers });
      const text = await res.text();
      const data = text ? JSON.parse(text) : null;
      if (!res.ok) throw data || new Error(res.statusText);
      return data;
    }

    async function loadPlayers() {
      const players = await api("/players");
      $("players").innerHTML = players.map(p => `
        <label class="player">
          <input type="checkbox" data-player-id value="${p.id}">
          <span><span class="name">#${p.id} ${p.name}</span><br><span class="meta">${p.position} | OVR ${p.overall} | FORM ${p.form} | ${p.playstyles.join(", ")}</span></span>
          <span class="pill">${p.pace}/${p.shoot}/${p.pass}/${p.dribbling}/${p.def}/${p.phy}</span>
        </label>`).join("");
      write({ players: players.length });
      return players;
    }

    $("registerBtn").onclick = async () => write(await api("/auth/register", { method:"POST", body: JSON.stringify({ username:$("username").value, email:$("email").value, password:$("password").value }) }));
    $("loginBtn").onclick = async () => {
      const data = await api("/auth/login", { method:"POST", body: JSON.stringify({ email:$("email").value, password:$("password").value }) });
      localStorage.tactiqToken = data.token;
      write({ loggedIn: true });
    };
    $("dbPlayersBtn").onclick = async () => { $("playersJson").value = JSON.stringify(await loadPlayers(), null, 2); };
    $("createPlayersBtn").onclick = async () => { write(await api("/players", { method:"POST", body: $("playersJson").value })); await loadPlayers(); };
    $("loadPlayersBtn").onclick = loadPlayers;
    $("deletePlayersBtn").onclick = async () => { write(await api("/players/bulk-delete", { method:"POST", body: JSON.stringify({ playerIds:selectedIds() }) })); await loadPlayers(); };
    $("balanceBtn").onclick = async () => write(await api("/team-builder/balance", { method:"POST", body: JSON.stringify({ teamSize:Number($("teamSize").value), formation:$("formation").value, playerIds:selectedIds() }) }), "teamsOutput");
    $("bulkMatchBtn").onclick = async () => {
      const ids = selectedIds();
      write(await api("/matches/bulk", { method:"POST", body: JSON.stringify({
        matchDate:new Date($("matchDate").value).toISOString(), duration:Number($("duration").value), homeScore:Number($("homeScore").value), awayScore:Number($("awayScore").value),
        defaultRating:Number($("defaultRating").value), homePlayerIds:ids.filter((_, i) => i % 2 === 0), awayPlayerIds:ids.filter((_, i) => i % 2 === 1)
      }) }));
      await loadPlayers();
    };
    $("createMatchBtn").onclick = async () => { write(await api("/matches", { method:"POST", body:$("matchJson").value })); await loadPlayers(); };
  </script>
</body>
</html>
